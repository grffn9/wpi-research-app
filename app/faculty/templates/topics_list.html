{% extends "faculty_base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Research Topics</h2>
    <a class="btn btn-primary mb-3" href="{{ url_for('faculty.create_topic') }}">Add Topic</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 180px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for topic in topics %}
            <tr>
                <td>{{ topic.name }}</td>
                <td>
                    <a class="btn btn-sm btn-secondary"
                       href="{{ url_for('faculty.edit_topic', topic_id=topic.id) }}">Edit</a>

                    <form method="POST"
                          action="{{ url_for('faculty.delete_topic', topic_id=topic.id) }}"
                          style="display: inline-block;"
                          onsubmit="return confirm('Delete this topic?');">
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
