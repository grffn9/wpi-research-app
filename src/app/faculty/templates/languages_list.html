{% extends "faculty_base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Programming Languages</h2>

    <a class="btn btn-primary mb-3" href="{{ url_for('faculty.create_language') }}">Add Language</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 180px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for lang in languages %}
            <tr>
                <td>{{ lang.name }}</td>
                <td>
                    <a class="btn btn-sm btn-secondary"
                       href="{{ url_for('faculty.edit_language', language_id=lang.id) }}">Edit</a>

                    <form method="POST"
                          action="{{ url_for('faculty.delete_language', language_id=lang.id) }}"
                          style="display: inline-block;"
                          onsubmit="return confirm('Delete this language?');">
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
